# Supabase Local Development Configuration

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# Edge Functions configuration
# Gateway JWT verify is off for these: they validate Authorization inside the function.
# (ES256 / newer JWT shapes can otherwise get 401 at the edge before your code runs.)
[functions.create-owner]
verify_jwt = false

[functions.toggle-owner]
verify_jwt = false

[functions.create-tenant]
verify_jwt = false

[functions.toggle-tenant]
verify_jwt = false

[functions.set-tenant-login]
verify_jwt = false

[functions.razorpay-webhook]
verify_jwt = false
